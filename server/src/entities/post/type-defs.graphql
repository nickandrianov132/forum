     type Post {
         id: ID!
         title: String!
         content: String!
         user: User!
           # Можно также добавить поля для счета лайков и дислайков
        #  likes: [Like!]!
        #  dislikes: [Dislike!]!
        # Теперь это обязательные поля (спасибо DataLoader)
         likesCount: Int!
         dislikesCount: Int!
        # Полезно знать: лайкнул ли пост текущий юзер?
         isLiked: Boolean!
         isDisliked: Boolean!    
         isOwner: Boolean!
     }
    type Query {
        posts: [Post!]!
        post(id: ID!): Post 
    }
    type Mutation {
        createPost(title: String!, content: String!, userId: ID!): Post
        updatePost(id: ID!, title: String, content: String): Post
        deletePost(id: ID!): Boolean

        # Лайки и Дизлайки (возвращают Post для мгновенного обновления кэша)
        addLike(postId: ID!): Post!
        addDislike(postId: ID!): Post!
    }